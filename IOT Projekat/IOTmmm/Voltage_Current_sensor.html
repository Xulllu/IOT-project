<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mjerilo</title>
    <style>
      #naslov
      {
        display: block;
        font-size: 50px;
        height: 100%;
        width: auto;
        background-color: rgb(0, 0, 0);
        margin: auto;
        text-align: center;
        color: rgb(255, 255, 0);
        border-radius: 10em 1em 10em 1em;
        font-family: 'Times New Roman', Times, serif;
        padding: 1%;
        text-shadow: 2px 2px 5px rgb(255, 251, 0);
        box-shadow: 10px 10px 10px rgb(65, 65, 65);
        
      }
      .dugme
      {
        display: inline;      
        margin-left: 20%;
        margin-top: 3%;
        margin-bottom: 5%;
        width: 23%;
        height: 50px;
        background-color: rgb(26, 25, 20);
        color: yellow;
        font-size: 20px;
        font-weight: bold;
        font-family: monospace;
        border: none;
      }
      .dugme:focus
      {
        box-shadow: 5px 10px 18px rgb(49, 49, 49);

      }
      #ukljuci:hover
      {
        background-color: rgb(63, 199, 9);
        cursor: pointer;
      }
      #iskljuci:hover
      {
        background-color: rgb(182, 41, 41);
        cursor: pointer;

      }
      #ukljuci:focus
      {
        background-color: rgb(63, 199, 9);
      }
      #iskljuci:focus
      {
        background-color: rgb(182, 41, 41);
      }
      #ukljuci
      {
        border-radius: 30px 50px 50px 100px;
      }
      #iskljuci
      {
        border-radius: 50px 30px 100px 50px;
      }
      body
      {
        background-color: rgb(156, 156, 1);
      }
     .iscitavanjeP
     {
      display: inline;
      width: 23%;
      height: 300px;
      overflow-y: scroll;
      margin-left: 20%;
      font-family: 'Times New Roman', Times, serif;
      background-color: black;
      color: yellow;
      font-size: 15px;
      resize: none;
      box-shadow: 5px 10px 18px rgb(255, 251, 0);
      
     }
     .iscitavanjeP::-webkit-scrollbar
     {
      width: 9px;
        
     }
     .iscitavanjeP::-webkit-scrollbar-track
     {
      background-color: rgb(0, 0, 0);
        

     }
     .iscitavanjeP::-webkit-scrollbar-thumb
     {
      background-color: rgb(255, 238, 0);
      cursor: pointer;
        

     }
     .naslov
     {
      display: block;
      margin-top: 20px;
      font-size: 30px;
      font-family: 'Times New Roman', Times, serif;
      text-align: center;
      letter-spacing: 1px;
      text-shadow: 2px 2px 5px rgb(20, 20, 20);

     }
     #prviNaslov
     {
      margin-left: 8%;
     }
     .naslovi-kontejner {
      display: flex;
      justify-content: space-around;
     }
    .textoviNJ
     {
      border-bottom: 4px dotted rgb(0, 0, 0);
      padding-bottom: 30px;

     }
     .naslov2-kontejner
     {
      display: flex;
      margin-top: 20px;

      align-items: center;
      

     }
     #treciNaslov
     {
      font-size: 30px;
      font-family: 'Times New Roman', Times, serif;
      text-align: left;
      letter-spacing: 1px;
      text-shadow: 2px 2px 5px rgb(20, 20, 20);
     }
   
     #snaga
     {
        height: 35px;
        margin-left: 2%;
        width: 20%;
        width: 23%;
        overflow-y: scroll;
        font-family: Arial, Helvetica, sans-serif;
        background-color: black;
        color: yellow;
        font-size: 15px;
        text-align:justify;
        box-shadow: 5px 10px 18px rgb(255, 255, 0);
       

     }
     #snaga::-webkit-scrollbar
     {
      width: 9px;
        
     }
     #snaga::-webkit-scrollbar-track
     {
      background-color: rgb(0, 0, 0);
        

     }
     #snaga::-webkit-scrollbar-thumb
     {
      background-color: rgb(255, 238, 0);
      cursor: pointer;
     }
     @media (max-width: 768px) {

      body
      {

        font-family: 'Times New Roman', Times, serif;
       
      }
      #naslov
      {
        font-size: 25px;
        padding:5%;
      }
      .dugme
      {
        font-size: 10px;
      }
      .naslov
      {
        font-size: 15px;

        
      }
      #prviNaslov
      {
        margin-left: 16%;
      }
      #drugiNaslov
      {
        margin-left: 5%;
      }
      #treciNaslov
      {
        font-size: 20px;
      }
      #snaga
      {
        width: 70%;
        resize: none;
      }
    }

</style>
</head>
<body>

    <div id="naslov" class="indikatori">Napon i jačina struje</div>

    <button  id="iskljuci" class="dugme" > Isključi </button>
    <button  id="ukljuci" class="dugme" > Blinkanje </button>

  <div class="naslovi-kontejner">
    <h1 id="prviNaslov" class="naslov">Napon(V)</h1>
    <h1 id="drugiNaslov" class="naslov">Jačina struje(I)</h1>
  </div>

  <div class="textoviNJ">
  <textarea id="napon" class="iscitavanjeP" readonly></textarea>
  <textarea id="jacinaS" class="iscitavanjeP" readonly></textarea>
</div>

  <div class="naslov2-kontejner">
    <h1 id="treciNaslov">Snaga(P):</h1>
    <textarea id="snaga" readonly></textarea>
  </div>


  

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  
  <script type="module">



  const firebaseConfig = {
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "voltage-and-current-sensor-led.firebaseapp.com",
    databaseURL: "https://voltage-and-current-sensor-led-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "voltage-and-current-sensor-led",
    storageBucket: "voltage-and-current-sensor-led.appspot.com",
    messagingSenderId: "199109894891",
    appId: "1:199109894891:web:8f5721f713bb7cde3b94ae",
    measurementId: "G-GTDYP7407S"
  };
  
    // inicijalizacija firebase-a
    const firebaseApp = firebase.initializeApp(firebaseConfig);
  
    function toggleLED(state) {
      firebase.database().ref('sensors/sensor1/led').set(state ? 1 : 0);
    } 
  
    document.getElementById('iskljuci').addEventListener('click', function() {
      toggleLED(true);
    });

    document.getElementById('ukljuci').addEventListener('click', function() {
      toggleLED(false);
    });

    let counter=1;
    firebase.database().ref('sensors/sensor1').on('value', (snapshot) => {
      const data = snapshot.val();


      //-----------------------------------------------------------------------------------------------------------------
      //napon 
      const voltageReading = parseFloat(data.napon);
      const convertedVoltage = convertVoltage(voltageReading); // Poziv funkcije za konverziju

      document.getElementById('napon').value += `${counter}.-------- ${convertedVoltage} V\n`;
      document.getElementById('napon').scrollTop = document.getElementById('napon').scrollHeight;
      //document.getElementById('napon').value += `${counter} ${data.napon}\n`;
      //document.getElementById('napon').scrollTop = document.getElementById('napon').scrollHeight;
    

      //-----------------------------------------------------------------------------------------------------------------
      //current
      const currentReading = parseFloat(data.jacinaS);
      const convertedCurrent = convertActiveLow(currentReading); 

      document.getElementById('jacinaS').value += `${counter}.-------- ${convertedCurrent} A\n`;
      document.getElementById('jacinaS').scrollTop = document.getElementById('jacinaS').scrollHeight;
      //document.getElementById('jacinaS').value += `${counter++} ${data.jacinaS}\n`;
      //document.getElementById('jacinaS').scrollTop = document.getElementById('jacinaS').scrollHeight;

      const convertedPower = Math.round(convertedCurrent * convertedVoltage * 10000) / 10000;


      document.getElementById('snaga').value += `${counter++}.-------- ${convertedPower} W\n`;
      document.getElementById('snaga').scrollTop = document.getElementById('snaga').scrollHeight;
    });


    function convertActiveLow(sensorReading) {
  const MAX_CURRENT = 0.020; 
  const MAX_ADC_VALUE = 4095; 
  const R = 68; 

  const maxVoltage = 3.3;
  const maxCurrent = maxVoltage / R; 

  const invertedReading = MAX_ADC_VALUE - sensorReading;

  const current = (invertedReading / MAX_ADC_VALUE) * maxCurrent;

  const roundedCurrent = Math.round(current * 10000) / 10000; 

  return roundedCurrent.toFixed(4); 
}



function convertVoltage(sensorReading) {
  const ADC_MAX = 4095; 
  const V_REF = 3.3; 

  const voltage = ((ADC_MAX - sensorReading) * V_REF) / ADC_MAX;

  return voltage.toFixed(2); 
}
  </script>
  
  </body>
</html>
